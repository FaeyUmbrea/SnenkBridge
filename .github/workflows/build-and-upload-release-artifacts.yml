name: Build and Upload Release Artifacts

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: snenk-bridge-cli-linux
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: snenk-bridge-cli-macos
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: snenk-bridge-cli-windows
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI release
        run: cargo build --release --package snenk_bridge --target ${{ matrix.target }}
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/snenk_bridge" dist/snenk_bridge
          tar -C dist -czf "dist/${{ matrix.artifact }}-${TAG}.tar.gz" snenk_bridge
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/snenk_bridge.exe" dist/snenk_bridge.exe
          cd dist
          7z a "${{ matrix.artifact }}-${TAG}.zip" snenk_bridge.exe
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/${{ matrix.artifact }}-${{ github.event.release.tag_name }}.tar.gz
          asset_name: ${{ matrix.artifact }}-${{ github.event.release.tag_name }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/${{ matrix.artifact }}-${{ github.event.release.tag_name }}.zip
          asset_name: ${{ matrix.artifact }}-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ui:
    name: Build UI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: snenk-bridge-ui-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: snenk-bridge-ui-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: snenk-bridge-ui-windows
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ui-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev
      - name: Build UI release
        run: cargo build --release --package snenk_bridge_ui --target ${{ matrix.target }}
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/snenk_bridge_ui" dist/snenk_bridge_ui
          tar -C dist -czf "dist/${{ matrix.artifact }}-${TAG}.tar.gz" snenk_bridge_ui
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/snenk_bridge_ui.exe" dist/snenk_bridge_ui.exe
          cd dist
          7z a "${{ matrix.artifact }}-${TAG}.zip" snenk_bridge_ui.exe
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/${{ matrix.artifact }}-${{ github.event.release.tag_name }}.tar.gz
          asset_name: ${{ matrix.artifact }}-${{ github.event.release.tag_name }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/${{ matrix.artifact }}-${{ github.event.release.tag_name }}.zip
          asset_name: ${{ matrix.artifact }}-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
